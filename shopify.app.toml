# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "30d18de2120b2219f486cdac3972365d"
name = "bb-final1"
application_url = "https://bb-final1.onrender.com"
embedded = true

[build]
include_config_on_deploy = true

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  compliance_topics = [ "customers/data_request", "customers/redact", "shop/redact" ]
  topics = [ "app/uninstalled" ]

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [
  "https://bb-final1.onrender.com/auth/callback",
  "https://bb-final1.onrender.com/auth/shopify/callback",
  "https://bb-final1.onrender.com/api/auth/callback"
]

[app_proxy]
url = "https://bb-final1.onrender.com/apps/bundle-builder"
subpath = "bundle-builder"
prefix = "apps"

[pos]
embedded = false
