name = "bundle-builder"
client_id = "YOUR_CLIENT_ID_HERE"
application_url = "https://YOUR_APP_URL_HERE"
embedded = true

[build]
include_config_on_deploy = true

[access_scopes]
scopes = "read_products,write_products,read_product_listings,read_collections,write_script_tags,read_script_tags,write_metafields,read_metafields,read_orders"

[auth]
redirect_urls = [
  "https://YOUR_APP_URL_HERE/auth/callback",
  "https://YOUR_APP_URL_HERE/auth/shopify/callback",
  "https://YOUR_APP_URL_HERE/api/auth/callback"
]

[webhooks]
api_version = "2024-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks"

[app_proxy]
url = "https://YOUR_APP_URL_HERE/apps/bundle-builder"
subpath = "bundle-builder"
prefix = "apps"

[pos]
embedded = false
